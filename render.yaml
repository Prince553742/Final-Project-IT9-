services:
  - type: web
    name: task-manager-minazukis-belly
    env: php
    buildCommand: "./render-build.sh"
    startCommand: "cd public && php -S 0.0.0.0:$PORT"
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        generateValue: true
      - key: APP_URL
        value: https://task-manager-minazukis-belly.onrender.com